name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths: [backend/**]
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/backend

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # needed for Azure OIDC login

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Apps
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ""
          containerAppName: itax-backend
          resourceGroup: itax-rg
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          environmentVariables: |
            ANTHROPIC_API_KEY=secretref:anthropic-api-key
            SUPABASE_URL=secretref:supabase-url
            SUPABASE_SERVICE_ROLE_KEY=secretref:supabase-service-role-key
            CORS_ORIGINS=secretref:cors-origins
            ADMIN_EMAIL=secretref:admin-email
            ADMIN_PASSWORD=secretref:admin-password
            JWT_SECRET=secretref:jwt-secret
